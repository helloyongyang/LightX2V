model:
    name: qwen_image
    pretrained_model_name_or_path: /data/nvme1/models/Qwen/Qwen-Image-2512
    max_sequence_length: 1024
    running_dtype: bf16

data:
    train:
        name: image_dataset
        num_workers: 8
        prompt_dropout_rate: 0.1
        image_size: 1024
        random_ratio: false
        shuffle: true
        # examples: https://github.com/ModelTC/LightX2V_train_data_examples
        data_path:
            - /data/nvme1/yongyang/kkk/datasets/chalkboarddrawing_lightx2v_train_data/train.jsonl
    val:
        name: image_dataset
        num_workers: 8
        image_size: 1024
        shuffle: false
        data_path:
            - /data/nvme1/yongyang/kkk/datasets/chalkboarddrawing_lightx2v_train_data/val.jsonl

scheduler:
    training:
        num_train_timesteps: 1000
        timestep_distribution: logitnormal
        logitnormal_mean: 0.0
        logitnormal_std: 1.0
        min_t: 0.001
        max_t: 1.0
        do_time_shift: true
        time_shift_mu: 5.0
        time_shift_power: 1.0

training:
    method: lora
    max_train_iters: 3000
    gradient_accumulation_iters: 1
    gradient_checkpointing: true
    max_grad_norm: 1.0
    lr_scheduler: constant
    lr_warmup_iters: 10
    save_every_iters: 250
    save_total_limit: 10
    lora:
        rank: 16
        alpha: 16
        target_modules:
            - to_k
            - to_q
            - to_v
            - to_out.0
    optimizer:
        learning_rate: 0.0001
        adam_beta1: 0.9
        adam_beta2: 0.999
        weight_decay: 0.01
        adam_epsilon: 0.00000001
    output_dir: ./output_train/qwen_image_lora

inference:
    # method: image           -- custom denoising loop (default, uses framework scheduler)
    # method: image_pipeline  -- diffusers pipeline call (for result alignment)
    method: image
    # prompts used for both standalone infer.py and training-time inference
    # use a list to generate multiple images per evaluation
    prompts:
        - "一个小狗的黑板画，要求傻傻的，像是一个幼儿园小朋友画的。"
    negative_prompt: " "
    width: 1024
    height: 1024
    num_inference_steps: 50
    cfg_guidance_scale: 4.0
    seed: 42
    output_dir: ./output_infer
    # set infer_every_iters to run inference during training (e.g. every 500 iters)
    # leave unset or null to disable training-time inference
    infer_every_iters: 500
